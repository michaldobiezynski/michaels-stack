name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Manifest and hooks.json are valid JSON
        run: |
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/plugin.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('hooks/hooks.json','utf8'))"

      - name: Every script referenced in hooks.json exists
        run: |
          node -e '
            const fs = require("fs");
            const raw = fs.readFileSync("hooks/hooks.json", "utf8");
            const refs = raw.match(/\$\{CLAUDE_PLUGIN_ROOT\}\/[^"]+/g) || [];
            let failed = false;
            for (const ref of refs) {
              const path = ref.replace("${CLAUDE_PLUGIN_ROOT}/", "");
              if (fs.existsSync(path)) {
                console.log("ok:", path);
              } else {
                console.error("MISSING hook target:", path);
                failed = true;
              }
            }
            if (refs.length === 0) { console.error("no hook refs found — parser broken?"); failed = true; }
            process.exit(failed ? 1 : 0);
          '

      - name: block-no-verify smoke tests (exit 2 = blocked, 0 = allowed)
        run: |
          expect_exit() {
            local want=$1; shift
            set +e; "$@"; local got=$?; set -e
            if [ "$got" -ne "$want" ]; then
              echo "FAIL: expected exit $want, got $got for: $*"
              exit 1
            fi
            echo "ok (exit $got): $*"
          }
          CLI=scripts/block-no-verify/dist/cli.js
          expect_exit 2 node "$CLI" "git commit --no-verify -m test"
          expect_exit 2 node "$CLI" "git push --no-verify"
          expect_exit 0 node "$CLI" "git commit -m test"
          expect_exit 0 node "$CLI" "ls -la"
          set +e; echo "git commit --no-verify -m x" | node "$CLI"; got=$?; set -e
          [ "$got" -eq 2 ] || { echo "FAIL: stdin pipe expected exit 2, got $got"; exit 1; }
          echo "ok (exit 2): stdin pipe"

      - name: shellcheck hook and sync scripts
        run: shellcheck scripts/*.sh
